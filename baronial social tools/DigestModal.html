<!DOCTYPE html>
<html>
  <head>
    <base target="_top">

    <!-- ============================================================
         DIGEST REVIEW MODAL
         A Renaissance Style Technical Folio
         ------------------------------------------------------------
         Purpose:
           This modal provides a quiet chamber where the Webminister
           may review the weekly digest before sending it to the
           Baronial Google Group. Both the subject line and the
           digest body may be edited here without altering the
           underlying engine.

         Notes:
           The modal does not generate content. It simply displays
           the completed digest and offers tools for copying,
           testing, and sending.
         ============================================================ -->

    <style>
      body {
        font-family: 'Segoe UI', sans-serif;
        padding: 20px;
        background: #fff;
      }

      label {
        font-weight: bold;
        font-size: 14px;
        color: #333;
      }

      input#subjectLine {
        width: 100%;
        padding: 10px;
        margin: 8px 0 20px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      textarea {
        width: 100%;
        height: 400px;
        padding: 15px;
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        resize: none;
      }

      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        flex: 1;
        padding: 12px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        min-width: 120px;
      }

      .btn-copy { background: #5f6368; color: white; }
      .btn-test { background: #1565c0; color: white; }
      .btn-email { background: #2e7d32; color: white; }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .hint {
        font-size: 11px;
        color: #666;
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body>

    <!-- ============================================================
         SUBJECT LINE
         ------------------------------------------------------------
         The subject line may be edited freely. This does not affect
         the digest engine and is safe for last minute adjustments.
         ============================================================ -->
    <label>Subject Line:</label>
    <input type="text" id="subjectLine" value="<?!= subject ?>">


    <!-- ============================================================
         DIGEST CONTENT
         ------------------------------------------------------------
         The full digest text is presented here for review. Edits
         made in this box will be reflected in the final email.
         ============================================================ -->
    <label>Digest Content:</label>
    <div class="hint">Edit below if needed before copying or sending.</div>
    <textarea id="digestBox"><?!= content ?></textarea>


    <!-- ============================================================
         ACTION BUTTONS
         ------------------------------------------------------------
         Copy Digest:
           Copies the digest text to the clipboard.

         Test Email:
           Sends the digest to the Webminister test address.

         Send to Group:
           Sends the digest to the Baronial Google Group.
         ============================================================ -->
    <div class="controls">
      <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 Copy Digest</button>
      <button class="btn-test" id="testBtn" onclick="sendTest()">🧪 Test Email (To Me)</button>
      <button class="btn-email" id="mainBtn" onclick="sendOfficial()">📧 Send to Group</button>
    </div>


    <script>
      /* ============================================================
         COPY FUNCTION
         ------------------------------------------------------------
         Copies the digest text to the clipboard and provides a
         brief visual confirmation.
         ============================================================ */
      function copyToClipboard() {
        const copyText = document.getElementById("digestBox");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);

        const btn = document.getElementById("copyBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied!";
        setTimeout(() => { btn.innerText = originalText; }, 2000);
      }


      /* ============================================================
         SEND TEST EMAIL
         ------------------------------------------------------------
         Sends the digest to the Webminister test address. This
         allows a quiet review before sending to the full group.
         ============================================================ */
      function sendTest() {
        var btn = document.getElementById('testBtn');
        btn.disabled = true;
        btn.innerText = "Sending...";

        google.script.run.withSuccessHandler(function(res) {
          alert(res);
          btn.disabled = false;
          btn.innerText = "🧪 Test Email (To Me)";
        }).sendToGroup(
          document.getElementById("subjectLine").value,
          document.getElementById("digestBox").value,
          true
        );
      }


      /* ============================================================
         SEND OFFICIAL EMAIL
         ------------------------------------------------------------
         Sends the digest to the Baronial Google Group. A confirm
         prompt ensures that the Webminister does not send it by
         accident.
         ============================================================ */
function sendOfficial() {
  if (!confirm("Send to official Google Group?")) return;

  var btn = document.getElementById('mainBtn');
  btn.disabled = true;
  btn.innerText = "Sending...";

  google.script.run
    .withSuccessHandler(function(res) {
      alert(res);
      google.script.host.close();
    })
    .withFailureHandler(function(err) {
      alert("Error: " + err); // This will tell you if the server-side code failed
      btn.disabled = false;
      btn.innerText = "📧 Send to Group";
    })
    .sendToGroup(
      document.getElementById("subjectLine").value,
      document.getElementById("digestBox").value,
      false
    );
}
    </script>

  </body>
</html>
