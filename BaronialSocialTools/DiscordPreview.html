<!DOCTYPE html>
<html>
  <head>
    <base target="_top">

    <!-- ============================================================
         DISCORD PREVIEW MODAL
         A Renaissance Style Technical Folio
         ------------------------------------------------------------
         Purpose:
           This modal provides a final resting place for the weekly
           digest before it is sent to Discord. It allows the
           Webminister to review, adjust, and approve the content
           with clarity and confidence.

         Notes:
           The modal does not generate the digest. It simply
           displays the sections prepared by Digest.gs and allows
           gentle, last minute edits before dispatch.
         ============================================================ -->

    <style>
      /* ------------------------------------------------------------
         VISUAL PRESENTATION
         ------------------------------------------------------------
         The styling reflects a clean, modern layout while keeping
         the focus on readability and calm review.
         ------------------------------------------------------------ */

      body {
        font-family: 'Segoe UI', sans-serif;
        padding: 15px;
        background-color: #f0f2f5;
      }

      h3 {
        margin-top: 0;
        color: #1b5e20;
        border-bottom: 2px solid #1b5e20;
        padding-bottom: 5px;
      }

      /* Section labels, color coded to match Discord embed borders */
      .section-label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        padding: 5px;
        border-radius: 4px 4px 0 0;
        color: white;
      }

      .lbl-header  { background-color: #444; }
      .lbl-barony  { background-color: #2e7d32; }
      .lbl-kingdom { background-color: #c5a000; }
      .lbl-online  { background-color: #1565c0; }

      textarea {
        width: 98%;
        height: 80px;
        margin-bottom: 5px;
        border: 1px solid #ccc;
        border-radius: 0 0 4px 4px;
        padding: 8px;
        font-size: 13px;
        resize: vertical;
      }

      .btn {
        background: #1b5e20;
        color: white;
        padding: 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 18px;
        font-weight: bold;
        margin-top: 15px;
      }

      .btn:hover {
        background: #2e7d32;
      }

      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>

    <!-- ============================================================
         HEADER
         ------------------------------------------------------------
         A simple title to orient the Webminister before review.
         ============================================================ -->
    <h3>🛡️ Final Discord Review</h3>


    <!-- ============================================================
         DIGEST SECTIONS
         ------------------------------------------------------------
         Each section is presented in its own textarea, allowing
         gentle edits without disturbing the structure of the
         digest engine.
         ============================================================ -->

    <span class="section-label lbl-header">Greetings & Header</span>
    <textarea id="header"></textarea>

    <span class="section-label lbl-barony">🏰 Baronial Events</span>
    <textarea id="barony" style="height: 100px;"></textarea>

    <span class="section-label lbl-kingdom">👑 Kingdom Events</span>
    <textarea id="kingdom" style="height: 100px;"></textarea>

    <span class="section-label lbl-online">🌐 Online Activities & Signature</span>
    <textarea id="online" style="height: 250px;"></textarea>


    <!-- ============================================================
         ACTION BUTTON
         ------------------------------------------------------------
         Sends the reviewed content back to the server side for
         final delivery to Discord.
         ============================================================ -->
    <button id="sendBtn" class="btn" onclick="send()">🚀 Fire to Discord</button>



    <script>
      /* ============================================================
         INITIALIZATION
         ------------------------------------------------------------
         Purpose:
           Populate the textareas with the digest sections passed
           from the server side. The footer contains both the
           online boilerplate and the Baronial Webminister signature.

         Notes:
           The online textarea shows the curated online list
           followed by the footer for a complete final review.
         ============================================================ */

      var sections = <?!= sections ?>;

      document.getElementById('header').value  = sections.header;
      document.getElementById('barony').value  = sections.barony;
      document.getElementById('kingdom').value = sections.kingdom;

      document.getElementById('online').value =
        sections.online + "\n\n" + sections.footer;



      /* ============================================================
         ACTION: send()
         ------------------------------------------------------------
         Purpose:
           Collects any edits made by the Webminister and returns
           them to the server side for final dispatch to Discord.

         Behavior:
           - Disables the button to prevent duplicate submissions.
           - Sends the updated sections to finalSendToDiscord().
           - Closes the modal upon success.

         Notes:
           The Discord splitting logic occurs in Discord.gs.
         ============================================================ */

      function send() {
        var btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        var finalSections = {
          header:  document.getElementById('header').value,
          barony:  document.getElementById('barony').value,
          kingdom: document.getElementById('kingdom').value,
          online:  sections.online,
          footer:  sections.footer
        };

        google.script.run
          .withSuccessHandler(function(response) {
            alert(response);
            google.script.host.close();
          })
          .withFailureHandler(function(err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "🚀 Fire to Discord";
          })
          .finalSendToDiscord(JSON.stringify(finalSections));
      }
    </script>

  </body>
</html>
