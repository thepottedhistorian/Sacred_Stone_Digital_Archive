<!DOCTYPE html>
<html>
  <head>
    <base target="_top">

    <!-- ============================================================
         UNIVERSAL PREVIEW MODAL
         A Renaissance Style Technical Folio
         ------------------------------------------------------------
         Purpose:
           This modal provides a unified space for reviewing any
           digest text before sending it to the Baronial Google
           Group. It is intentionally simple, offering only the
           essentials: a subject line, a full text preview, and
           two actions.

         Notes:
           This modal is used for special cases or alternate
           workflows where the standard digest modal is not
           required.
         ============================================================ -->

    <style>
      /* ------------------------------------------------------------
         VISUAL PRESENTATION
         ------------------------------------------------------------
         A clean, modern layout that keeps attention on the text.
         ------------------------------------------------------------ */

      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #f4f7f6;
      }

      label {
        font-weight: bold;
        font-size: 14px;
        color: #333;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      textarea {
        width: 100%;
        height: 500px;
        padding: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        font-size: 13px;
        box-sizing: border-box;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 15px;
      }

      button {
        padding: 12px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        color: white;
        transition: 0.2s;
      }

      .btn-copy {
        background: #3498db;
      }
      .btn-copy:hover {
        background: #2980b9;
      }

      .btn-email {
        background: #27ae60;
      }
      .btn-email:hover {
        background: #219150;
      }
    </style>
  </head>

  <body>

    <!-- ============================================================
         HEADER
         ------------------------------------------------------------
         A simple title to orient the Webminister before review.
         ============================================================ -->
    <h3>🛡️ Baronial Social Tools Preview</h3>


    <!-- ============================================================
         SUBJECT LINE
         ------------------------------------------------------------
         The subject line may be edited freely. This does not affect
         the underlying engine and is safe for last minute changes.
         ============================================================ -->
    <label>Email Subject</label>
    <input type="text" id="subjectLine" value="<?= defaultSubject ?>">


    <!-- ============================================================
         DIGEST CONTENT
         ------------------------------------------------------------
         The full digest text is presented here for review. Edits
         made in this box will be reflected in the final email.
         ============================================================ -->
    <label>Digest Content</label>
    <textarea id="digestBox"><?= digest ?></textarea>


    <!-- ============================================================
         ACTION BUTTONS
         ------------------------------------------------------------
         Copy Text:
           Copies the digest to the clipboard.

         Send to Google Group:
           Sends the digest to the Baronial Google Group using the
           server side finalDispatch function.
         ============================================================ -->
    <div class="controls">
      <button class="btn-copy" onclick="copyText()">Copy Text</button>
      <button class="btn-email" onclick="sendEmail()">Send to Google Group</button>
    </div>


    <script>
      /* ============================================================
         COPY FUNCTION
         ------------------------------------------------------------
         Copies the digest text to the clipboard using the modern
         navigator.clipboard API, with a fallback for older systems.
         ============================================================ */
      function copyText() {
        const box = document.getElementById('digestBox');
        box.select();

        navigator.clipboard.writeText(box.value)
          .then(() => {
            alert("Copied to clipboard.");
          })
          .catch(err => {
            console.error("Copy failed:", err);
            document.execCommand('copy');
            alert("Copied.");
          });
      }


      /* ============================================================
         SEND EMAIL
         ------------------------------------------------------------
         Sends the digest to the Baronial Google Group. A confirm
         prompt ensures that the Webminister does not send it by
         accident.

         Behavior:
           - Disables the button to prevent duplicate sends.
           - Passes the subject and body to finalDispatch().
         ============================================================ */
      function sendEmail() {
        if (!confirm("Are you sure you want to send this to the official Google Group?")) {
          return;
        }

        const body = document.getElementById('digestBox').value;
        const subject = document.getElementById('subjectLine').value;

        const btn = document.querySelector('.btn-email');
        btn.disabled = true;
        btn.innerText = "Sending...";

        google.script.run
          .withSuccessHandler(() => google.script.host.close())
          .withFailureHandler(err => {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "Send to Google Group";
          })
          .finalDispatch(body, "GoogleGroup", subject);
      }
    </script>

  </body>
</html>
